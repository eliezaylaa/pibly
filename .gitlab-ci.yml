stages:
  - test
  - build
  - deploy

test:backend:
  stage: test
  image: node:20-alpine
  services:
    - name: postgres:15-alpine
      alias: postgres
  variables:
    POSTGRES_DB: pibly
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    DB_HOST: postgres
    DB_PORT: 5432
    DB_NAME: pibly
    DB_USER: postgres
    DB_PASSWORD: postgres
    JWT_SECRET: test_secret
    REFRESH_SECRET: test_refresh_secret
    STRIPE_SECRET_KEY: sk_test_fake123456789
  before_script:
    - cd backend
    - npm install
  script:
    - npm test -- --forceExit

build:backend:dev:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - cd backend
    - docker build -f Dockerfile.dev -t $CI_REGISTRY_IMAGE/backend:dev .
    - docker push $CI_REGISTRY_IMAGE/backend:dev
  only:
    - dev

build:backend:prod:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - cd backend
    - docker build -f Dockerfile.prod -t $CI_REGISTRY_IMAGE/backend:prod .
    - docker push $CI_REGISTRY_IMAGE/backend:prod
  only:
    - main

build:frontend:dev:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - cd frontend
    - docker build -f Dockerfile.dev -t $CI_REGISTRY_IMAGE/frontend:dev .
    - docker push $CI_REGISTRY_IMAGE/frontend:dev
  only:
    - dev

build:frontend:prod:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - cd frontend
    - docker build -f Dockerfile.prod -t $CI_REGISTRY_IMAGE/frontend:prod .
    - docker push $CI_REGISTRY_IMAGE/frontend:prod
  only:
    - main

deploy:dev:
  stage: deploy
  script:
    - echo "Deploying to development environment"
  environment:
    name: development
  only:
    - dev

deploy:prod:
  stage: deploy
  script:
    - echo "Deploying"
  environment:
    name: production
  only:
    - main
  when: manual
